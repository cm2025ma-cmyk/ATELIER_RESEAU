<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Atelier Réseau · M2{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo-dot"></span>
      <span>Atelier Réseau <span class="muted">· M2</span></span>
    </div>
    <nav>
      <a href="/"        {% if active=='index'   %}class="active"{% endif %}>Accueil</a>
      <a href="/osi"     {% if active=='osi'     %}class="active"{% endif %}>OSI</a>
      <a href="/dhcp"    {% if active=='dhcp'    %}class="active"{% endif %}>DHCP</a>
      <a href="/nat"     {% if active=='nat'     %}class="active"{% endif %}>NAT/PAT</a>
      <a href="/metrics" {% if active=='metrics' %}class="active"{% endif %}>Métriques</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>Atelier pédagogique — réseau Master 2</span>
    <span>Données aussi disponibles en JSON&nbsp;: <code>?format=json</code> ou <code>Accept: application/json</code></span>
  </footer>
</body>
</html>
